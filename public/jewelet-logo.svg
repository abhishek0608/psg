<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 84" role="img" aria-labelledby="title desc">
  <title id="title">Jewelet logo</title>
  <desc id="desc">A navy monogram medallion with a gold gem beside the JEWELET wordmark.</desc>
  <defs>
    <linearGradient id="jw-gold" x1="30" y1="14" x2="54" y2="36" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f8d979"/>
      <stop offset=".55" stop-color="#e9bd3f"/>
      <stop offset="1" stop-color="#c99237"/>
    </linearGradient>
    <linearGradient id="jw-navy" x1="42" y1="4" x2="42" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#16466c"/>
      <stop offset="1" stop-color="#0d2436"/>
    </linearGradient>
  </defs>
  <g fill="none" fill-rule="evenodd">
    <!-- Medallion -->
    <circle cx="42" cy="42" r="38" fill="url(#jw-navy)"/>
    <circle cx="42" cy="42" r="32.5" stroke="#e9bd3f" stroke-opacity=".65" stroke-width="1.1"/>
    <!-- Faceted gem crown -->
    <g stroke="url(#jw-gold)" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round">
      <path d="M36.2 15.5h11.6l3.9 4.8L42 31.5l-9.7-11.2 3.9-4.8Z"/>
      <path d="M36.2 15.5l5.8 4.8 5.8-4.8M32.3 20.3h19.4M42 20.5v10.6"/>
    </g>
    <!-- J monogram -->
    <text x="42" y="66" text-anchor="middle" font-family="Didot, 'Bodoni MT', 'Playfair Display', Georgia, serif" font-size="33" font-weight="400" fill="#f7fbfd">J</text>
    <!-- Wordmark -->
    <text x="96" y="49" font-family="Didot, 'Bodoni MT', 'Playfair Display', Georgia, serif" font-size="28" font-weight="500" letter-spacing="6.5" fill="#133a59">JEWELET</text>
    <text x="97" y="68" font-family="'DM Sans', 'Trebuchet MS', Verdana, sans-serif" font-size="9" font-weight="600" letter-spacing="4.6" fill="#a97825">FINE JEWELLERY</text>
  </g>
</svg>
